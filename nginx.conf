server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- CONFIGURAÇÃO DO PROXY PARA O N8N ---
  location /webhook/ {
    # 1. Tratamento do Preflight (OPTIONS) direto no Nginx
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        add_header 'Content-Length' 0;
        add_header 'Content-Type' 'text/plain';
        return 204;
    }

    # 2. Adiciona os headers de CORS também na resposta final do n8n
    add_header 'Access-Control-Allow-Origin' '*' always;

    # 3. Repassa a requisição
    proxy_pass https://teste-n8n-webhook.6esqeg.easypanel.host/webhook/;
    proxy_ssl_server_name on;
    proxy_set_header Host teste-n8n-webhook.6esqeg.easypanel.host;
  }
  # ----------------------------------------

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}