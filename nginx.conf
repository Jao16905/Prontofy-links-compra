server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- CONFIGURAÇÃO DO PROXY PARA O N8N ---
  location /webhook {
    # 1. Tratamento do Preflight (CORS / OPTIONS)
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
        add_header 'Content-Length' 0;
        add_header 'Content-Type' 'text/plain';
        return 204;
    }

    # 2. Rewrite idêntico ao do Vite
    # Isso evita redirecionamentos automáticos (301) do Nginx que fazem o navegador 
    # perder o JSON do POST e transformar a chamada em GET.
    rewrite ^/webhook/?(.*)$ /webhook/$1 break;

    # 3. Cabeçalhos rigorosos para o Easypanel/Traefik não rejeitarem a chamada (Causa principal do 400)
    proxy_ssl_server_name on;
    proxy_ssl_name teste-n8n-webhook.6esqeg.easypanel.host;
    proxy_set_header Host teste-n8n-webhook.6esqeg.easypanel.host;

    # 4. Repasse da requisição (note que removemos a barra do final aqui)
    proxy_pass https://teste-n8n-webhook.6esqeg.easypanel.host;

    # 5. Preservação de IP e suporte ao ambiente
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  # ----------------------------------------

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}