server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- CONFIGURAÇÃO DO PROXY PARA O N8N ---
  location /webhook/ {
    # Repassa a requisição para a URL do seu n8n
    proxy_pass https://teste-n8n-webhook.6esqeg.easypanel.host/webhook/;
    
    # Muito importante: Como o destino é HTTPS, isso garante que o Nginx 
    # envie o nome do servidor correto (SNI) para o Easypanel rotear certo.
    proxy_ssl_server_name on;
    proxy_set_header Host teste-n8n-webhook.6esqeg.easypanel.host;
    
    # Repassa os IPs reais caso você precise dessa informação no n8n
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  # ----------------------------------------

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}